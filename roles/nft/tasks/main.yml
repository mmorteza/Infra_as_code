#    mode: '0644'
#  notify: Reload nftables

- name: Upload nftables configuration
  template:
    src: nft.conf.j2
    dest: /etc/nftables.conf
  notify: Restart nftables
  when: inventory_hostname not in groups['bind_servers']

- name: Ensure nftables is enabled and started
  systemd:
    name: nftables
    state: started
    enabled: true
  ignore_errors: true