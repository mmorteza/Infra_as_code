- name: gather  packages facts
  ansible.builtin.package_facts:
    manager: auto

- name: Install nftables
  apt:
    name: nftables
    state: present
    update_cache: yes
  when: "'nftables' not in ansible_facts.packages"

- name: register status of /etc/nftables.d/
  stat:
    path: /etc/nftables.d/
  register: nft_dir

- name: Create nftables rule dir
  file:
    path: /etc/nftables.d
    state: directory
    mode: '0755'
  when:
    - "not nft_dir.stat.exists"
    - inventory_hostname not in groups['bind_servers']

- name: register status of /etc/nft/nftables.d/
  stat:
    path: /etc/nft/nftables.d/
  register: nft_rule_dir

- name: Create /etc/nft/nftbales.d
  file:
    path: /etc/nft/nftables.d
    state: directory
    mode: '0755'
  when: "not nft_rule_dir.stat.exists"

- name: Deploy new nftables rule format
  template:
    src: nft.new.conf.j2
    dest: /etc/nftables.conf
  when: inventory_hostname in groups['bind_servers']

- name: Deploy new nftable rules into /etc/nft/nftables.d
  template:
    src: nft.rule.conf.j2
    dest: /etc/nft/nftables.d/50-hardening-basic.rules
  notify: Reload nftables
  when: inventory_hostname in groups['bind_servers']
# - name: Deploy nftables SSH access Rules
